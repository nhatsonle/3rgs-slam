inherit: "config/base.yaml"

dataset:
  subsample: 1   

gaussian_splat:
  enabled: true
  c_conf_threshold: 0.5
  max_gaussians: 500000
  n_iters: 10000
  lr_means: 1.6e-4
  lr_opacity: 5.0e-2
  lr_scales: 5.0e-3
  lr_quats: 1.0e-3
  lr_sh: 2.5e-3
  densify_from_iter: 300
  densify_until_iter: 2000
  densify_interval: 100
  opacity_reset_interval: 1000
  prune_opacity_thresh: 0.005
  grad_thresh: 2.0e-4
  lambda_ssim: 0.2
  lambda_depth: 0.1
  depth_min_conf: 0.3
  # Set online: true to use incremental mode instead of offline training
  online: true
  online_iters_per_kf: 100   # per-KF steps; with batch processing, total = iters * n_new_kfs
  online_finalize_iters: 5000
  # GlobalGaussianMap — multi-view fusion + association engine
  use_global_map: true
  map_baseline_thresh: 0.02
  map_conf_thresh: 0.20
  map_cooldown_frames: 3
  map_window_size: 5
  map_min_frames: 2
  assoc_thresh: 0.05
  assoc_voxel: 0.05
  assoc_max_check: 3000
  merge_ema: 0.30
  lambda_reg: 0.01
  reanchor_on_loop_closure: true
  cleanup_interval_kf: 10
