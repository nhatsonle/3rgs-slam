use_calib: False
single_thread: False
dataset:
  subsample: 1
  img_downsample: 1
  center_principle_point: True

matching:
  max_iter: 10
  lambda_init: 1e-8
  convergence_thresh: 1e-6
  dist_thresh: 1e-1 # distance in 3D space
  radius: 3
  dilation_max: 5 # Right now starts from max and iteratively decreases until 1

tracking:
  min_match_frac: 0.05
  max_iters: 50
  C_conf: 0.0
  Q_conf: 1.5
  rel_error: 1e-3
  delta_norm: 1e-3
  huber: 1.345
  match_frac_thresh: 0.7
  sigma_ray: 0.003
  sigma_dist: 1e+1
  sigma_pixel: 1.0
  sigma_depth: 1e+1 # NOTE: log-depth!
  sigma_point: 0.05
  pixel_border: -10 # Only in calib (negative means allow pixels outside image up to that distance)
  depth_eps: 1e-6 # Only in calib case
  filtering_mode: weighted_pointmap # recent, first, best_score, weighted_pointmap, weighted_spherical, indep_conf
  filtering_score: median # median, mean (only used for filtering_mode=best_score)

local_opt:
  pin: 1
  window_size: 1e+6   
  C_conf: 0.0
  Q_conf: 1.5
  min_match_frac: 0.1
  pixel_border: -10 # Only in calib (negative means allow pixels outside image up to that distance)
  depth_eps: 1e-6 # Only in calib case
  max_iters: 10
  sigma_ray: 0.003
  sigma_dist: 1e+1
  sigma_pixel: 1.0
  sigma_depth: 1e+1 # NOTE: log-depth!
  sigma_point: 0.05
  delta_norm: 1e-8
  use_cuda: True

retrieval:
  k: 3
  min_thresh: 5e-3

reloc:
  min_match_frac: 0.3
  strict: True

gaussian_splat:
  # ── Offline batch reconstruction (original mode) ──────────────────────────
  enabled: false
  # Confidence gate for Gaussian initialisation (0–1).
  # Raise to create fewer Gaussians; lower for denser coverage.
  c_conf_threshold: 0.5
  # Hard cap on total Gaussians — primary guard against memory blowup.
  max_gaussians: 2000000
  # Training
  n_iters: 10000
  # Per-parameter learning rates
  lr_means: 1.6e-4
  lr_opacity: 5.0e-2
  lr_scales: 5.0e-3
  lr_quats: 1.0e-3
  lr_sh: 2.5e-3
  # Adaptive density control
  densify_from_iter: 500
  densify_until_iter: 5000
  densify_interval: 100
  opacity_reset_interval: 3000
  prune_opacity_thresh: 0.005
  grad_thresh: 2.0e-4
  # Loss weights (offline path)
  lambda_ssim: 0.2       # weight of D-SSIM term; 0 = pure L1
  lambda_depth: 0.1      # weight of log-depth loss; 0 = disabled
  depth_min_conf: 0.3    # ignore depth loss where MASt3R confidence is below this

  # ── Online incremental reconstruction (MASt3R-GS paper mode) ─────────────
  online_enabled: false
  # Sliding window: W most-recent + R random historical cameras per step
  window_size: 5
  random_history: 2
  # Coarse mapping: Adam steps fired immediately after a new keyframe arrives
  steps_per_keyframe: 50
  # Idle training steps between keyframe events
  idle_train_steps: 5
  # Per-keyframe Gaussian insertion cap (prevents single-keyframe memory spike)
  max_gaussians_per_kf: 50000
  # Fine refinement iterations run after SLAM terminates (Stage 2)
  n_iters_fine: 2000
  fine_log_interval: 500
  # Online loss weights (paper Eq.13):
  #   L = alpha_rgb * L1_rgb + (1-alpha_rgb) * L_depth + lambda_iso * L_iso
  #   When lambda_ssim > 0, L1_rgb is blended with D-SSIM (improves perceptual quality)
  alpha_rgb: 0.95        # paper default: 0.95
  lambda_iso: 10.0       # isotropic scale regularisation (paper: 10); lower = more elongated
  lambda_ssim: 0.0       # D-SSIM weight; 0 = pure L1 matching paper; 0.2 = better perceptual
  # lambda_depth and depth_min_conf are shared with the offline path above

  # Gaussian scale bounds for initialization (log-space, world units)
  # log_scale -3 → ~0.05;  -2 → ~0.14;  -1 → ~0.37 world units
  disc_z_factor: 0.1     # z-axis init = in-plane * factor → disc-shaped Gaussians
  max_log_scale: -2.0    # cap on largest axis (shift-down preserves disc anisotropy)
  min_log_scale: -7.0    # floor prevents degenerate near-zero Gaussians
  max_scale_ratio: 10.0  # needle pruning: s1/s2 > this → remove (discs s1/s2≈1 are safe)
  # Confidence-modulated scale: low-confidence regions get larger Gaussians.
  # boost(conf=1)=1.0 (unchanged); boost(conf=0)=scale_conf_boost.
  # Set scale_conf_boost: 1.0 to disable (backward-compatible default).
  scale_conf_boost: 1.0  # max scale multiplier for zero-confidence pixels; 1.0 = off
  scale_conf_gamma: 2.0  # curve sharpness; higher = only very-low-conf pixels boosted

  # Fine refinement controls
  fine_prune_thresh: 0.01 # opacity threshold for floater pruning before fine stage
                          # higher = more aggressive pruning