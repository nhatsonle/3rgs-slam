use_calib: False
single_thread: False
dataset:
  subsample: 1
  img_downsample: 1
  center_principle_point: True

matching:
  max_iter: 10
  lambda_init: 1e-8
  convergence_thresh: 1e-6
  dist_thresh: 1e-1 # distance in 3D space
  radius: 3
  dilation_max: 5 # Right now starts from max and iteratively decreases until 1

tracking:
  min_match_frac: 0.05
  max_iters: 50
  C_conf: 0.0
  Q_conf: 1.5
  rel_error: 1e-3
  delta_norm: 1e-3
  huber: 1.345
  match_frac_thresh: 0.333
  sigma_ray: 0.003
  sigma_dist: 1e+1
  sigma_pixel: 1.0
  sigma_depth: 1e+1 # NOTE: log-depth!
  sigma_point: 0.05
  pixel_border: -10 # Only in calib (negative means allow pixels outside image up to that distance)
  depth_eps: 1e-6 # Only in calib case
  filtering_mode: weighted_pointmap # recent, first, best_score, weighted_pointmap, weighted_spherical, indep_conf
  filtering_score: median # median, mean (only used for filtering_mode=best_score)

local_opt:
  pin: 1
  window_size: 1e+6   
  C_conf: 0.0
  Q_conf: 1.5
  min_match_frac: 0.1
  pixel_border: -10 # Only in calib (negative means allow pixels outside image up to that distance)
  depth_eps: 1e-6 # Only in calib case
  max_iters: 10
  sigma_ray: 0.003
  sigma_dist: 1e+1
  sigma_pixel: 1.0
  sigma_depth: 1e+1 # NOTE: log-depth!
  sigma_point: 0.05
  delta_norm: 1e-8
  use_cuda: True

retrieval:
  k: 3
  min_thresh: 5e-3

reloc:
  min_match_frac: 0.3
  strict: True

gaussian_splat:
  enabled: true
  # Confidence gate for Gaussian initialisation (0–1).
  # Raise to create fewer Gaussians; lower for denser coverage.
  c_conf_threshold: 0.5
  # Hard cap on total Gaussians — primary guard against memory blowup.
  max_gaussians: 2000000
  # Training
  n_iters: 10000
  # Per-parameter learning rates
  lr_means: 1.6e-4
  lr_opacity: 5.0e-2
  lr_scales: 5.0e-3
  lr_quats: 1.0e-3
  lr_sh: 2.5e-3
  # Adaptive density control
  densify_from_iter: 500
  densify_until_iter: 5000
  densify_interval: 100
  opacity_reset_interval: 3000
  prune_opacity_thresh: 0.005
  grad_thresh: 2.0e-4
  # Loss weights
  lambda_ssim: 0.2       # weight of D-SSIM term; 0 = pure L1
  lambda_depth: 0.1      # weight of log-depth loss; 0 = disabled
  depth_min_conf: 0.3    # ignore depth loss where MASt3R confidence is below this
  # Online (incremental) mode — trains GS alongside SLAM in the backend process
  online: true
  online_iters_per_kf: 60     # Adam steps per new keyframe (total = iters * batch_size)
  heartbeat_sec: 30            # online GS heartbeat log interval (seconds)
  densify_online: true          # density control during online training
  pose_refine: false            # photometric pose refinement after each KF (experimental)
  pose_refine_iters: 10         # steps of pose refinement per KF
  lr_pose: 1.0e-4               # Adam LR for pose refinement (4×4 viewmat)
  online_finalize_iters: 3000   # extra steps after SLAM ends for quality polish
  # Non-keyframe auxiliary supervision (photometric L1 only, no Gaussian init)
  aux_ratio: 0.3          # fraction of training steps sampling an aux non-KF frame
  aux_max_frames: 200     # max aux frames held in buffer (oldest discarded)
  aux_blur_thresh: 50.0   # Laplacian variance below this → skip (too blurry)
  aux_novelty_min: 0.05   # min translation distance to last KF (skip near-duplicates)
  aux_max_age: 8          # frames elapsed since last KF beyond which frames are skipped
  aux_decay: 0.95         # temporal weight: weight = decay^frame_age
  # ── GlobalGaussianMap (Steps 2–12) ──────────────────────────────────────────
  # Set use_global_map: true to replace OnlineGaussianSplat with GlobalGaussianMap
  use_global_map: true
  # Step 2 — Mapping Frame Selector
  map_baseline_thresh: 0.02   # min translation from last KF to be a mapping frame
  map_conf_thresh: 0.20       # min average MASt3R confidence
  map_cooldown_frames: 3      # min frames between consecutive mapping frames
  # Step 3 — Local Fusion Buffer
  map_window_size: 7          # sliding window depth (number of mapping frames)
  map_min_frames: 2           # minimum frames required before fusion triggers
  # Step 6 — Association Engine
  assoc_thresh: 0.05          # 3-D distance threshold: merge if closer, spawn otherwise
  assoc_voxel: 0.05           # voxel cell size for spatial hash (same units as scene)
  assoc_max_check: 5000       # max candidate Gaussians checked per association pass
  # Step 7 — Merge
  merge_ema: 0.30             # EMA alpha for SH colour update during merge
  # Step 9 — Regularisation loss weight
  lambda_reg: 0.01            # scale + opacity regulariser (set 0 to disable)
  # Step 11 — Re-anchor after loop closure
  reanchor_on_loop_closure: true
  # Step 12 — Periodic cleanup cadence
  cleanup_interval_kf: 10     # run cleanup every N keyframes